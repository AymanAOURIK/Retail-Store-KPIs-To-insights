version: 1
scenarios:
  - id: store_g_2025_w21_dq
    description: Store_G 2025 W21 data-quality scenario with a sales decline and a traffic-driven narrative.
    payload:
      store_alias: STORE_07
      year: 2025
      week: 21
      kpis:
        net_sales: 612.4
        traffic: 81.0
        conversion_rate: 0.19
      yoy:
        net_sales: -0.224
        traffic: -0.181
      network_median:
        net_sales: 790.0
        traffic: 101.0
        conversion_rate: 0.23
      network_mad:
        net_sales: 42.0
        traffic: 9.0
        conversion_rate: 0.01
      store_vs_network:
        net_sales: -177.6
        traffic: -20.0
        conversion_rate: -0.04
      driver_attribution:
        traffic: 72.0
        conversion_rate: 18.0
        units_per_txn: 5.0
        avg_selling_price: 5.0
      flags: []
      dq_caveats:
        - "gross_transactions_exceeds_traffic: gross_transactions exceeds traffic."
      has_ly_baseline: true

